<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-content="memories.meta_title">Student Memories | Jenifer Antony Padyachi</title>
  <meta
    name="description"
    content="Student memories gallery for Jenifer Antony Padyachi."
    data-i18n-content="memories.meta_description"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="memories">
  <div class="site-bg" aria-hidden="true"></div>
  <div class="page-shell">
    <header class="site-header compact-header">
      <div class="shell">
        <nav class="topbar">
          <a class="brand" href="index.html" aria-label="Jenifer Antony Padyachi home">JA</a>
          <div class="topbar-actions">
            <div class="nav-links" id="nav-links">
              <a href="index.html#summary" data-i18n="nav.summary">Summary</a>
              <a href="index.html#experience" data-i18n="nav.experience">Experience</a>
              <a href="index.html#education" data-i18n="nav.education">Education</a>
              <a href="memories.html" data-i18n="nav.memories">Memories</a>
              <a href="contact.html" data-i18n="nav.contact">Contact</a>
            </div>
            <button class="lang-toggle" type="button" aria-label="Switch language" data-lang-toggle>
              中文
            </button>
          </div>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="nav-links" data-i18n="common.menu">
            Menu
          </button>
        </nav>

        <section class="simple-hero memory-hero" data-reveal>
          <h1><a href="http://trjenifer.com/" target="_blank" rel="noreferrer" data-i18n="memories.title">Notes and memories from students and colleagues</a></h1>
          <p class="hero-identity" data-i18n="memories.identity">A quiet collection of messages, moments, and photos from the journey.</p>
        </section>
      </div>
    </header>

    <main class="shell">
      <section
        class="section"
        data-gallery-owner="Michael-Augustine"
        data-gallery-repo="JeniferPortfolio"
        data-gallery-branch="main"
        data-gallery-folder="student-memories/photos"
      >
        <div class="memory-toolbar" data-reveal>
          <p class="memory-count" data-memory-count>Loading images...</p>
        </div>

        <div class="memory-grid" data-memory-grid></div>

        <article class="content-card memory-empty" data-memory-empty hidden>
          <h3 data-i18n="memories.empty_title">No memories yet</h3>
          <p data-i18n="memories.empty_body">Memories will appear here soon.</p>
        </article>

        <div class="memory-lightbox" data-memory-lightbox hidden>
          <button class="memory-lightbox-close" type="button" aria-label="Close image view" data-memory-close data-i18n="memories.close">
            Close
          </button>
          <div class="memory-lightbox-dialog">
            <img class="memory-lightbox-image" src="" alt="" data-memory-lightbox-image>
            <p class="memory-lightbox-caption" data-memory-lightbox-caption></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-i18n="common.footer">
      Made with love ❤️ in Taipei · Jenifer Antony Padyachi © 2026
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
